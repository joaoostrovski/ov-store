version: 2.1

jobs:
  build_and_test:
    docker:
      - image: cimg/openjdk:17.0
    steps:
      - checkout

      - setup_remote_docker

      - run:
          name: Start MariaDB
          command: >
            docker run -d --name mariadb
            -e MYSQL_ROOT_PASSWORD=root
            -e MYSQL_DATABASE=ov_store
            -p 3306:3306 mariadb:10.5

      - run:
          name: Wait for MariaDB to start
          command: sleep 30

      - run:
          name: Build with Maven
          command: mvn -B package --file pom.xml

      - run:
          name: Run tests with Maven
          command: mvn test

      - run:
          name: Check for Tags on Current Commit
          command: |
            git fetch --tags
            TAG=$(git tag --points-at HEAD)
            echo "TAG=${TAG}" | tee tag_info.txt
            echo "Tag on commit: ${TAG}"

      - run:
          name: Persist Tag Information
          command: |
            mkdir -p ~/workspace
            mv tag_info.txt ~/workspace/
      - persist_to_workspace:
          root: ~/workspace
          paths:
            - tag_info.txt

      - run:
          name: Push to Test if Build and Tests Succeed
          when: on_success
          command: |
            git config --global user.email "youremail@example.com"
            git config --global user.name "YourName"
            git remote set-url origin https://${GITHUB_TOKEN}@github.com/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}.git
            git fetch origin
            git checkout -B test
            git merge --no-ff --no-edit $CIRCLE_BRANCH
            git push origin test

  deploy:
    docker:
      - image: cimg/openjdk:17.0
    steps:
      - checkout

      - attach_workspace:
          at: ~/workspace

      - run:
          name: Read Tag Information
          command: |
            source ~/workspace/tag_info.txt
            echo "TAG is ${TAG}"

      - run:
          name: Set up Git
          command: |
            git config --global user.email "youremail@example.com"
            git config --global user.name "YourName"
            git remote set-url origin https://${GITHUB_TOKEN}@github.com/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}.git

      - run:
          name: Conditional Deployment
          command: |
            if [ -n "${TAG}" ]; then
              echo "Tag detected: ${TAG}"
              # Merge test into master
              git fetch origin
              git checkout master || git checkout -b master
              git merge --no-ff --no-edit origin/test
              git push origin master

              # Create a release
              curl -X POST \
                -H "Authorization: token ${GITHUB_TOKEN}" \
                -H "Content-Type: application/json" \
                -d '{
                  "tag_name": "'"${TAG}"'",
                  "target_commitish": "master",
                  "name": "'"${TAG}"'",
                  "body": "Release of version '"${TAG}"'",
                  "draft": false,
                  "prerelease": false
                }' \
                https://api.github.com/repos/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}/releases
            else
              echo "No tag detected. Skipping merge to master and release creation."
            fi

workflows:
  version: 2
  build_and_deploy:
    jobs:
      - build_and_test:
          filters:
            branches:
              only: dev
      - deploy:
          requires:
            - build_and_test
